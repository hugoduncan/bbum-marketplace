name: Count Stars

on:
  push:
    branches:
      - master
    paths:
      - 'registry/**'

jobs:
  count-stars:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Push back to master requires a token with write access.
          # GITHUB_TOKEN is sufficient when branch protection does not require
          # signed commits.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Babashka
        run: curl -s https://raw.githubusercontent.com/babashka/babashka/master/install | sudo bash

      - name: Recount star files and update library entries
        run: bb count-stars

      - name: Commit and push updated star counts (if any changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/libraries/
          if git diff --staged --quiet; then
            echo "No star count changes to commit."
          else
            git commit -m "🔄 update star counts"
            git push
          fi
