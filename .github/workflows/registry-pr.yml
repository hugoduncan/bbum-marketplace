name: Registry PR

on:
  pull_request:
    paths:
      - 'registry/**'

jobs:
  # ── Job 1: validate all registry entries ─────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Babashka
        run: curl -s https://raw.githubusercontent.com/babashka/babashka/master/install | sudo bash

      - name: Validate registry entries (structure + URL reachability)
        run: bb validate-registry
        env:
          VERIFY_URLS: "true"

  # ── Job 2: auto-merge if the PR only adds star files ─────────────────────
  auto-merge-stars:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check whether PR only touches star files
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          files=$(gh api \
            repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files \
            --jq '.[].filename')

          echo "Changed files:"
          echo "$files"

          # Allow only registry/stars/<slug>/<file>.edn
          non_star=$(echo "$files" \
            | grep -vE '^registry/stars/[^/]+/[^/]+\.edn$' || true)

          if [ -n "$non_star" ]; then
            echo ""
            echo "Non-star files found (human review required):"
            echo "$non_star"
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
          else
            echo ""
            echo "All changed files are star entries — eligible for auto-merge"
            echo "should_merge=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-merge stars-only PR
        if: steps.guard.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --squash \
            --repo "$GITHUB_REPOSITORY" \
            --subject "⭐ auto-merge: stars PR #$PR_NUMBER"
